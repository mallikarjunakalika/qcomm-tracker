name: Daily Q-Commerce Scrape

on:
  schedule:
    # Runs at 12:30 AM UTC = 6:00 AM IST every day
    - cron: '30 6 * * *'   # 7:00 AM IST
    - cron: '30 14 * * *'   # 1:00 PM IST
    - cron: '30 20 * * *'  # 7:00 PM IST
  workflow_dispatch:
    # Also allows manual trigger from GitHub UI (Actions tab â†’ Run workflow)

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 240   # 4 hour max (scraper takes 2-3 hrs)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright pandas openpyxl
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated dashboard
        run: |
          git config user.name "qcomm-bot"
          git config user.email "bot@qcomm"
          git add index.html last_run.txt
          git diff --cached --quiet || git commit -m "Auto-update: Q-Commerce availability $(date +'%Y-%m-%d')"
          git push
