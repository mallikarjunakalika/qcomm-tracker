name: Daily Q-Commerce Scrape

on:
  schedule:
    - cron: '30 1 * * *'
    - cron: '30 7 * * *'
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright pandas openpyxl
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated dashboard
        run: |
          git config user.name "qcomm-bot"
          git config user.email "bot@qcomm"
          git add index.html last_run.txt
          git diff --cached --quiet || git commit -m "Auto-update $(date +'%Y-%m-%d %H:%M')"
          git push
