name: Daily Q-Commerce Scrape

on:
  schedule:
    # Runs at 12:30 AM UTC = 6:00 AM IST every day
    - cron: '30 0 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub UI (Actions tab â†’ Run workflow)

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 240   # 4 hour max (scraper takes 2-3 hrs)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright pandas openpyxl
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated dashboard
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Q-Commerce availability $(date +'%Y-%m-%d')"
          file_pattern: index.html last_run.txt
          commit_user_name: "qcomm-bot"
          commit_user_email: "bot@qcomm"
